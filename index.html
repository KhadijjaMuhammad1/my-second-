<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool</title>
    <style>
        body { font-family: sans-serif; background: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #res { width: 100%; max-width: 380px; margin-top: 20px; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <input type="text" id="s" placeholder="رقم المرسل">
        <input type="text" id="r" placeholder="رقم المستلم">
        <button onclick="draw()">تجهيز</button>
    </div>
    <img id="res">
    <canvas id="c"></canvas>

    <script>
        function draw() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = 'blank_invoice.png.PNG'; 
            img.crossOrigin = "Anonymous";

            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.fillStyle = "#555555"; 
                ctx.textAlign = "right";
                ctx.font = "500 28px Arial";

                // أرقام تجريبية لتحت جداً عشان نصيد الخانات
                // رقم "من"
                ctx.fillText(document.getElementById('s').value, canvas.width - 250, 1050); 
                // رقم "إلى"
                ctx.fillText(document.getElementById('r').value, canvas.width - 250, 1380);

                // المرجع والتاريخ
                ctx.textAlign = "left";
                ctx.font = "24px Arial";
                const ref = Math.floor(100000000 + Math.random() * 900000000);
                ctx.fillText(ref, 180, 1550); // المرجع

                const d = new Date();
                const dStr = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}) + " " + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
                ctx.fillText(dStr, 180, 1680); // التاريخ

                const out = document.getElementById('res');
                out.src = canvas.toDataURL('image/png');
                out.style.display = 'block';
            };
        }
    </script>
</body>
</html>
