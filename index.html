<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOM | Style & Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background-color: #050505;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .card {
            background: #0f0f0f;
            padding: 40px 25px;
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            border: 1px solid #222;
        }

        .profile-img {
            width: 130px; height: 130px;
            border-radius: 20px;
            border: 2px solid #d32f2f;
            margin-bottom: 20px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .brand-name { font-size: 36px; font-weight: 900; margin-bottom: 5px; letter-spacing: 3px; }
        .slogan { color: #d32f2f; font-size: 14px; margin-bottom: 25px; text-transform: uppercase; }

        .social-link {
            display: flex; align-items: center; justify-content: center;
            background: #1a1a1a;
            padding: 18px; margin: 12px 0;
            border-radius: 12px; text-decoration: none;
            color: #fff; transition: all 0.3s;
            border: 1px solid #333;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        /* تأثير اللمعة */
        .social-link:hover { background: #d32f2f; border-color: #d32f2f; transform: scale(1.02); }
        
        .social-link i { font-size: 24px; margin-left: 15px; }

        .footer-note { margin-top: 30px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <img src="profile.png" alt="Venom Style" class="profile-img">
        <div class="brand-name">VENOM</div>
        <div class="slogan">إطلالة تفرض سيطرتها</div>
        
        <a href="https://www.facebook.com/share/19NXsm4Wjh/?mibextid=wwXIfr" class="social-link" target="_blank">
            <i class="fab fa-facebook" style="color: #1877f2;"></i>
            <span>تابعنا على فيسبوك</span>
        </a>
        
        <a href="#" class="social-link">
            <i class="fab fa-instagram" style="color: #e1306c;"></i>
            <span>تصفح أحدث التشكيلات</span>
        </a>

        <div class="footer-note">© 2026 VENOM FASHION. جميع الحقوق محفوظة</div>
    </div>

</body>
</html>
