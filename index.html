<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>

<style>
body {
    font-family: -apple-system, Arial;
    background: #f2f2f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #007aff;
    color: white;
    font-weight: bold;
}

img {
    width: 100%;
    max-width: 400px;
    margin-top: 15px;
    border-radius: 12px;
}
</style>
</head>

<body>

<input id="name" placeholder="اسم المرسل">
<input id="s_num" placeholder="رقم المرسل">
<input id="r_num" placeholder="رقم المستلم">
<input id="note" placeholder="ملاحظة">

<button onclick="draw()">إنشاء</button>

<img id="res">
<canvas id="c" style="display:none;"></canvas>

<script>
function draw() {

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    // ✅ الامتداد الكبير زي ما طلبت
    img.src = 'blank_invoice.PNG';

    img.onload = function() {

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const rightX = canvas.width - 60;
        const leftX = 60;

        const fromY = canvas.height * 0.52;
        const toY = canvas.height * 0.62;

        const refY = canvas.height * 0.80;
        const dateY = canvas.height * 0.86;
        const noteY = canvas.height * 0.93;

        ctx.textBaseline = "middle";

        // ===== FROM =====
        ctx.textAlign = "right";
        ctx.fillStyle = "#222";
        ctx.font = "bold 26px Arial";
        ctx.fillText(
            document.getElementById('name').value || "حساب شخصي",
            rightX,
            fromY
        );

        const s = document.getElementById('s_num').value || "01200000000";
        const masked = s.slice(0,3) + " • • • • • " + s.slice(-3);

        ctx.fillStyle = "#777";
        ctx.font = "20px Arial";
        ctx.fillText(masked, rightX, fromY + 40);

        // ===== TO =====
        ctx.fillStyle = "#222";
        ctx.font = "bold 26px Arial";
        ctx.fillText(
            document.getElementById('r_num').value || "",
            rightX,
            toY
        );

        // ===== REF =====
        ctx.textAlign = "left";
        ctx.fillStyle = "#555";
        ctx.font = "22px Arial";

        const ref = "23" + Math.floor(1000000 + Math.random() * 9000000);
        ctx.fillText(ref, leftX, refY);

        // ===== DATE =====
        const now = new Date();
        const dStr = now.toLocaleDateString('en-GB', {
            day:'2-digit',
            month:'short',
            year:'numeric'
        }) + " " + now.toLocaleTimeString('en-GB', {
            hour:'2-digit',
            minute:'2-digit',
            hour12:true
        }).toUpperCase();

        ctx.fillText(dStr, leftX, dateY);

        // ===== NOTE =====
        ctx.textAlign = "right";
        ctx.fillStyle = "#888";
        ctx.font = "20px Arial";

        ctx.fillText(
            document.getElementById('note').value || "نفقات",
            rightX,
            noteY
        );

        // عرض الصورة
        const out = document.getElementById('res');
        out.src = canvas.toDataURL('image/png');
        out.style.display = 'block';
    };
}
</script>

</body>
</html>
