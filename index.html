<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaPay Pro System</title>
    <style>
        /* سحب خط الآيفون الأصلي لضمان الواقعية */
        @font-face {
            font-family: 'SFPro';
            src: url('https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscodisplay-medium-webfont.woff2');
        }
        body { font-family: 'SFPro', -apple-system, sans-serif; background: #f2f2f7; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .admin-panel { background: white; padding: 15px; border-radius: 15px; width: 95%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; margin-top: 10px; z-index: 100; border: 1px solid #d1d1d6; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #c7c7cc; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #007aff; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-move { background: #007aff; color: white; font-size: 14px; box-shadow: 0 2px 5px rgba(0,122,255,0.3); }
        .btn-move:active { transform: scale(0.9); }
        .btn-gen { background: #34c759; color: white; width: 100%; padding: 16px; font-size: 18px; margin-top: 15px; border-radius: 12px; }
        .btn-toggle { background: #8e8e93; color: white; margin: 10px 0; font-size: 13px; padding: 8px 15px; }
        #res-container { width: 100%; max-width: 400px; margin-top: 15px; text-align: center; }
        #res { width: 100%; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); display: none; }
        canvas { display: none; }
        .label { font-size: 13px; font-weight: 600; color: #1c1c1e; display: block; margin-top: 10px; }
        .hint { font-size: 11px; color: #8e8e93; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <button class="btn btn-toggle" onclick="toggleAdmin()">⚙️ لوحة التحكم المخفية</button>

    <div class="admin-panel" id="panel">
        <label class="label">اسم المرسل (من):</label>
        <input type="text" id="name" placeholder="مثلاً: محمد أحمد علي">
        
        <label class="label">رقم المرسل (للتمويه التلقائي):</label>
        <input type="text" id="s_num" placeholder="012XXXXXXXX">

        <label class="label">رقم المستلم (إلى):</label>
        <input type="text" id="r_num" placeholder="010XXXXXXXX">

        <label class="label">الملاحظة (اختياري):</label>
        <input type="text" id="note" placeholder="نفقات المعيشة" value="نفقات المعيشة">

        <label class="label">أدوات النيشان (سيتم حفظها):</label>
        <div class="control-grid">
            <div></div><button class="btn btn-move" onclick="adj('y', -2)">⬆️ فوق</button><div></div>
            <button class="btn btn-move" onclick="adj('x', 2)">➡️ يمين</button>
            <button class="btn btn-move" onclick="adj('y', 2)">⬇️ تحت</button>
            <button class="btn btn-move" onclick="adj('x', -2)">⬅️ شمال</button>
        </div>
        <p class="hint">التحريك بمقدار بسيط (2px) لضبط دقيق جداً</p>

        <button class="btn btn-gen" onclick="draw()">تجهيز الفاتورة الأصلية</button>
        <button class="btn btn-toggle" style="width:100%; background:#ff3b30" onclick="toggleAdmin()">إغلاق اللوحة</button>
    </div>

    <div id="res-container">
        <img id="res">
        <p id="save-hint" style="display:none; font-size:12px; color:#666; margin-top:10px;">اضغط مطولاً على الصورة لحفظها</p>
    </div>

    <canvas id="c"></canvas>

    <script>
        // استعادة الإحداثيات من ذاكرة المتصفح أو القيم الافتراضية
        let startX = parseFloat(localStorage.getItem('posX')) || 140; 
        let startY = parseFloat(localStorage.getItem('posY')) || 545;

        function toggleAdmin() {
            const p = document.getElementById('panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function adj(axis, val) {
            if(axis === 'x') startX += val;
            if(axis === 'y') startY += val;
            localStorage.setItem('posX', startX);
            localStorage.setItem('posY', startY);
            draw(); 
        }

        function draw() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = 'blank_invoice.png.PNG'; 
            img.crossOrigin = "Anonymous";

            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // إعدادات الخط والألوان الاحترافية
                ctx.fillStyle = "#4a4a4a"; 
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";

                // 1. خانة "من" (الاسم + التمويه الاحترافي)
                ctx.font = "500 25px 'SFPro', Arial";
                ctx.fillText(document.getElementById('name').value || "حساب شخصي", canvas.width - startX, startY);
                
                const s = document.getElementById('s_num').value || "01200000000";
                const masked = s.slice(0, 3) + " • • • • • " + s.slice(-3);
                ctx.font = "20px 'SFPro', Arial";
                ctx.fillStyle = "#6d6d72";
                ctx.fillText(masked, canvas.width - startX, startY + 40);

                // 2. خانة "إلى" (الرقم ظاهر بالكامل)
                ctx.fillStyle = "#4a4a4a";
                ctx.font = "500 25px 'SFPro', Arial";
                ctx.fillText(document.getElementById('r_num').value, canvas.width - startX, startY + 175);

                // 3. المرجع والتاريخ (تنسيق InstaPay)
                ctx.textAlign = "left";
                ctx.fillStyle = "#6d6d72";
                ctx.font = "22px 'SFPro', Arial";
                const ref = "2399" + Math.floor(1000000 + Math.random() * 9000000);
                ctx.fillText(ref, 65, startY + 245);
                
                const now = new Date();
                const dStr = now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}) + " " + now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:true}).toUpperCase();
                ctx.fillText(dStr, 65, startY + 305);

                // 4. الملاحظة المتغيرة
                ctx.textAlign = "right";
                ctx.font = "20px 'SFPro', Arial";
                ctx.fillStyle = "#8a8a8e";
                ctx.fillText(document.getElementById('note').value || "نفقات المعيشة", canvas.width - 65, startY + 415);

                // عرض النتيجة النهائية
                const out = document.getElementById('res');
                out.src = canvas.toDataURL('image/png');
                out.style.display = 'block';
                document.getElementById('save-hint').style.display = 'block';
            };
        }
    </script>
</body>
</html>
