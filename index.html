<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOM | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; padding: 20px; }
        
        /* صفحة الدخول */
        #welcome-page { position: absolute; width: 100%; z-index: 10; background: radial-gradient(circle, #330000 0%, #000 100%); }
        .venom-text { 
            font-size: 60px; font-weight: 900; color: #ff0033; 
            text-shadow: 0 0 20px #ff0033, 0 0 40px #660000;
            margin-bottom: 50px;
        }
        .enter-btn { padding: 15px 60px; border: none; background: linear-gradient(45deg, #ff0033, #ff5500); color: #fff; font-size: 20px; border-radius: 50px; box-shadow: 0 10px 20px rgba(255,0,51,0.4); cursor: pointer; }

        /* صفحة الروابط */
        #main-page { display: none; opacity: 0; background: #0a0a0a; }
        .card { 
            background: rgba(20, 20, 20, 0.8); 
            padding: 40px 30px; 
            border-radius: 30px; 
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid #330000;
            box-shadow: 0 20px 40px rgba(255, 0, 51, 0.2);
        }
        .social-link { 
            display: flex; align-items: center; justify-content: center; 
            background: #1a1a1a; padding: 20px; margin: 20px 0; border-radius: 15px; 
            text-decoration: none; color: #fff; font-size: 19px; border: 1px solid #333;
            transition: 0.3s;
        }
        .social-link:hover { background: #222; }
        
        /* تكبير أيقونة الفيسبوك بشكل ملحوظ */
        .social-link i { margin-left: 20px; font-size: 32px; color: #4267B2; }
    </style>
</head>
<body>

    <div id="welcome-page" class="page">
        <div class="venom-text">VENOM</div>
        <button class="enter-btn" onclick="enterSite()">دخول</button>
    </div>

    <div id="main-page" class="page">
        <div class="card">
            <h2 style="color: #ff0033; margin-bottom: 25px;">بسم الله.. أناقة تليق بك</h2>
            <a href="https://www.facebook.com/share/19NXsm4Wjh/?mibextid=wwXIfr" class="social-link" target="_blank">
                <i class="fab fa-facebook"></i> فيسبوك
            </a>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('welcome-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-page').style.display = 'none';
                document.getElementById('main-page').style.display = 'flex';
                document.getElementById('main-page').style.opacity = '1';
            }, 1000);
        }
    </script>
</body>
</html>
