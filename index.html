<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        @keyframes blink { 50% { opacity: 0; } }
        h2 { font-size: 18px; animation: blink 1s infinite; margin-bottom: 10px; }
        .container { width: 100%; max-width: 400px; }
        #console { border: 1px solid #0f0; padding: 10px; height: 200px; overflow-y: auto; font-size: 12px; margin-top: 10px; background: #050505; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 8px; width: 60%; }
        button { padding: 8px; cursor: pointer; background: #0f0; color: #000; border: none; font-weight: bold; width: 30%; }
    </style>
</head>
<body>

    <div class="container">
        <h2>YOUSSEF INDEX [ACTIVE]</h2>
        <input type="text" id="targetInput" placeholder="TARGET ID...">
        <button onclick="executeAction()">INITIATE</button>
        <div id="console"></div>
    </div>

    <script>
        const token = "8980175969:AAG9MwlMTxSLejCZoDYUQKRdlkvJMZrCNmA";
        const targetBotId = "7259204597"; 

        async function executeAction() {
            const input = document.getElementById('targetInput').value;
            const log = document.getElementById('console');
            if (!input) return;

            log.innerHTML += `<div>> SYNCING: ${input} ...</div>`;
            
            // إرسال الأمر
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${targetBotId}&text=${encodeURIComponent(input)}`);

            log.innerHTML += "<div>> اصبر يا كسمك، يتم السحب برعاية اندكس...</div>";
            
            let attempts = 0;
            let checkInterval = setInterval(async () => {
                attempts++;
                const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    const lastMsg = data.result[data.result.length - 1].message;
                    if (lastMsg && lastMsg.from.id == targetBotId) {
                        log.innerHTML += `<div style='color: #fff;'>[>>] DATA: ${lastMsg.text}</div>`;
                        clearInterval(checkInterval);
                    }
                }
                if (attempts > 10) { 
                    log.innerHTML += "<div style='color: red;'>[!] TIMEOUT.</div>";
                    clearInterval(checkInterval);
                }
            }, 2000);
        }
    </script>
</body>
</html>
