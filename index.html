<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Venom | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 320px;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        /* تنسيق الصورة الشخصية */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #d32f2f;
            margin: 15px auto;
            display: block;
            object-fit: cover;
        }

        .welcome-text {
            font-size: 20px;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-link {
            display: flex;
            align-items: center;
            background: #111;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .social-link:hover {
            background: #d32f2f;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="welcome-text">مرحباً بك في عالم VENOM</div>

        <img src="images/profile.jpg" alt="Venom Profile" class="profile-img">

        <div class="brand-name">VENOM</div>
        
        <a href="https://www.facebook.com/share/19NXsm4Wjh/?mibextid=wwXIfr" class="social-link" target="_blank">
            <i class="fab fa-facebook" style="margin-left:10px;"></i> فيسبوك
        </a>
        <a href="#" class="social-link">
            <i class="fab fa-instagram" style="margin-left:10px;"></i> انستجرام
        </a>
    </div>

</body>
</html>
