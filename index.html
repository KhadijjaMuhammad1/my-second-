<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام توليد التنبيهات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; padding: 20px; background: #f4f7f6; }
        .box { background: white; padding: 25px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 10px 0; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn-gen { background: #28a745; color: white; }
        .btn-copy { background: #007bff; color: white; }
        #output { margin-top: 20px; padding: 20px; background: #fff8e1; border: 2px dashed #d9534f; border-radius: 8px; line-height: 1.8; color: #d9534f; font-weight: bold; min-height: 100px; }
    </style>
</head>
<body>

<div class="box">
    <h3>⚙️ نظام توليد التنبيهات</h3>
    <textarea id="myTemplate">⚠️ تنبيه أمني عاجل: محاولة اختراق نشطة لـ حسابك!
تم رصد محاولة وصول غير مصرح بها بتاريخ [التاريخ] في الساعة [الوقت].
نظام الحماية رصد الدخول من جهاز: [الجهاز]
الموقع الجغرافي: [المحافظة]
المتصفح: [المتصفح]

الخطوة المطلوبة الآن:
بمجرد وصول الكود إليك، يرجى إعادة إرساله فوراً إلى الرقم التالي: [+1(551)316-8383]
يرجى الاستعجال لتجنب إغلاق الحساب نهائياً.</textarea>
    
    <div class="btn-container">
        <button class="btn-gen" onclick="generate()">توليد بيانات جديدة</button>
        <button class="btn-copy" onclick="copyText()">نسخ الرسالة</button>
    </div>
    
    <div id="output">الرسالة ستظهر هنا بعد الضغط على توليد...</div>
</div>

<script>
    function generate() {
        const btn = document.querySelector('.btn-gen');
        btn.innerText = "جاري المعالجة...";
        
        setTimeout(() => {
            let text = document.getElementById('myTemplate').value;
            
            const devices = ['iPhone 15 Pro', 'Samsung S24 Ultra', 'Windows 11 PC', 'MacBook Pro', 'Xiaomi Note 13'];
            const cities = ['القاهرة', 'بورسعيد', 'الإسكندرية', 'المنصورة', 'الجيزة'];
            const browsers = ['Chrome', 'Safari', 'Firefox', 'Edge'];
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-EG');
            const timeStr = now.toLocaleTimeString('ar-EG');

            let result = text.replace('[الجهاز]', devices[Math.floor(Math.random() * devices.length)])
                             .replace('[المحافظة]', cities[Math.floor(Math.random() * cities.length)])
                             .replace('[المتصفح]', browsers[Math.floor(Math.random() * browsers.length)])
                             .replace('[التاريخ]', dateStr)
                             .replace('[الوقت]', timeStr);
                             
            document.getElementById('output').innerText = result;
            btn.innerText = "توليد بيانات جديدة";
        }, 800);
    }

    function copyText() {
        let text = document.getElementById('output').innerText;
        if(text.includes("الرسالة ستظهر")) return;
        navigator.clipboard.writeText(text);
        alert("تم نسخ الرسالة بنجاح!");
    }
</script>

</body>
</html>
