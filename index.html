<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VENOM | 3D Experience</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; }
        .enter-btn { 
            position: absolute; bottom: 10%; padding: 15px 40px; 
            background: transparent; color: #fff; border: 2px solid #d32f2f; 
            cursor: pointer; font-size: 20px; z-index: 10; border-radius: 50px;
        }
        .enter-btn:hover { background: #d32f2f; }
    </style>
</head>
<body>

    <!-- الجزء الخاص بالـ 3D -->
    <div id="canvas-container"></div>
    <button class="enter-btn" onclick="window.location.href='main.html'">ENTER</button>

    <!-- استدعاء مكتبة Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إنشاء شكل بسيط كبديل للكلمة (أو يمكن تحميل خط 3D)
        const geometry = new THREE.TorusGeometry(3, 1, 16, 100);
        const material = new THREE.MeshPhongMaterial({ color: 0xd32f2f, shininess: 100 });
        const venomObject = new THREE.Mesh(geometry, material);
        scene.add(venomObject);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 10;

        // التفاعل مع حركة الماوس أو اللمس
        document.addEventListener('mousemove', (e) => {
            venomObject.rotation.y = (e.clientX / window.innerWidth - 0.5) * 2;
            venomObject.rotation.x = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
