<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOM | Official</title>
    <!-- استدعاء خط Cairo الفخم -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background-color: #0a0a16;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* خلفية 3D متحركة */
        .bg-animate { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .shape { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5; animation: move 10s infinite alternate; }
        .s1 { width: 300px; height: 300px; background: #ff0055; top: -50px; left: -50px; }
        .s2 { width: 350px; height: 350px; background: #7000ff; bottom: -80px; right: -80px; animation-delay: -3s; }

        @keyframes move { from { transform: translate(0,0); } to { transform: translate(50px, 50px); } }

        /* الكارد الفخم */
        .card {
            position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float 5s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* تأثير النبض للصورة */
        .profile-img {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 4px solid #d32f2f;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            object-fit: cover;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        .brand-name { font-size: 28px; font-weight: 900; margin-bottom: 25px; letter-spacing: 3px; }

        .social-link {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px; margin: 12px 0;
            border-radius: 15px; text-decoration: none;
            color: #fff; transition: 0.4s;
            position: relative;
        }

        .social-link:hover { background: #d32f2f; transform: scale(1.05); }
        .social-link i { position: absolute; left: 20px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
    </div>

    <div class="card">
        <img src="profile.png" alt="Profile" class="profile-img">
        <div class="brand-name">VENOM</div>
        
        <a href="https://www.facebook.com/share/19NXsm4Wjh/?mibextid=wwXIfr" class="social-link" target="_blank">
            <i class="fab fa-facebook" style="color: #1877f2;"></i>
            <span>فيسبوك</span>
        </a>
        
        <a href="#" class="social-link">
            <i class="fab fa-instagram" style="color: #fc00ff;"></i>
            <span>انستجرام</span>
        </a>
    </div>

</body>
</html>
