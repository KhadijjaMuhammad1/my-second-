<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaPay Tool</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f2; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #res { width: 100%; max-width: 380px; margin-top: 20px; border-radius: 10px; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <label>من:</label> <input type="text" id="s" placeholder="رقم المرسل">
        <label>إلى:</label> <input type="text" id="r" placeholder="رقم المستلم">
        <button onclick="draw()">تجهيز الفاتورة الآن</button>
    </div>
    <img id="res">
    <canvas id="c"></canvas>

    <script>
        function draw() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = 'blank_invoice.png.PNG'; 
            img.crossOrigin = "Anonymous";

            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.fillStyle = "#444444"; 
                ctx.textAlign = "right";

                // --- الأماكن الجديدة المظبوطة ---
                ctx.font = "500 28px Arial";
                // رقم "من"
                ctx.fillText(document.getElementById('s').value, canvas.width - 250, 525);
                // رقم "إلى"
                ctx.fillText(document.getElementById('r').value, canvas.width - 250, 695);

                // المرجع والتاريخ (تحت)
                ctx.textAlign = "left";
                ctx.font = "22px Arial";
                const ref = Math.floor(100000000 + Math.random() * 900000000);
                ctx.fillText(ref, 100, 785); // المرجع

                const d = new Date();
                const dateStr = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}) + " " + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
                ctx.fillText(dateStr, 100, 845); // التاريخ

                const out = document.getElementById('res');
                out.src = canvas.toDataURL('image/png');
                out.style.display = 'block';
            };
        }
    </script>
</body>
</html>
