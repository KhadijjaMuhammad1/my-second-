<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Youssef Index Control</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; height: 350px; overflow-y: scroll; margin-top: 10px; background: #000; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 70%; }
        button { padding: 10px 20px; cursor: pointer; background: #0f0; color: #000; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Youssef Index Control</h2>
    <input type="text" id="targetInput" placeholder="اكتب البيانات للبحث...">
    <button onclick="executeAction()">INITIATE</button>

    <div id="console"></div>

    <script>
        // إعدادات البوت والجروب
        const token = "8980175969:AAG9MwlMTxSLejCZoDYUQKRdlkvJMZrCNmA";
        const chatId = "-1003514744905";
        const botId = "8980175969"; // الآيدي الخاص ببوتك

        async function executeAction() {
            const input = document.getElementById('targetInput').value;
            const log = document.getElementById('console');
            if (!input) return;

            // 1. رسالة "الاستفزاز"
            const waitMessage = "اصبر يا كسمك، يتم السحب برعاية اندكس...";
            log.innerHTML += `<div>> ${waitMessage}</div>`;

            // 2. إرسال للجروب
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(input)}`);

            log.innerHTML += "<div>> جاري المعالجة...</div>";
            
            // 3. مراقبة الرد
            let attempts = 0;
            let checkInterval = setInterval(async () => {
                attempts++;
                const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    const lastMsg = data.result[data.result.length - 1].message;
                    
                    // التحقق من أن الرد من البوت الآخر (ليس البوت الخاص بك)
                    if (lastMsg.chat.id == chatId && lastMsg.text && lastMsg.from.id != botId) {
                        log.innerHTML += `<div style='color: white;'>[RESULT]: ${lastMsg.text}</div>`;
                        clearInterval(checkInterval);
                    }
                }

                if (attempts > 15) { 
                    log.innerHTML += "<div style='color: red;'>[TIMEOUT]: لم يتم استلام رد.</div>";
                    clearInterval(checkInterval);
                }
            }, 2000); // الفحص كل ثانيتين
        }
    </script>
</body>
</html>
